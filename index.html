<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* =========================================================
       BRAND CONFIG — edit variables here to restyle quickly
       ========================================================= */
    :root {
      --accent:   #00d4ff;
      --accent2:  #7c3aed;
      --bg:       #0a0a0f;
      --bg2:      #111118;
      --bg3:      #1a1a24;
      --text:     #e8e8f0;
      --muted:    #8888a8;
      --border:   rgba(255,255,255,0.08);
      --radius:   12px;
      --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Utilities ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .accent    { color: var(--accent); }
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 100px;
      padding: 4px 14px;
      margin-bottom: 18px;
    }
    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 14px;
    }
    .section-sub {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 560px;
    }
    section { padding: 96px 0; }
    section:nth-child(even) { background: var(--bg2); }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(10,10,15,0.82);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-cta {
      background: var(--accent);
      color: #000 !important;
      font-weight: 700 !important;
      padding: 8px 20px;
      border-radius: 8px;
      transition: opacity 0.2s !important;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* ── Language toggle ── */
    .lang-toggle {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 6px 11px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      font-family: var(--font);
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { background: var(--accent); color: #000; }

    /* ── Hero ── */
    #hero {
      padding: 160px 0 100px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 700px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow { margin-bottom: 24px; }
    .hero-title {
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 24px;
      max-width: 780px;
    }
    .hero-title .highlight {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 560px;
      margin-bottom: 40px;
    }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      font-size: 0.95rem;
      padding: 14px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover {
      background: var(--bg3);
      border-color: rgba(255,255,255,0.18);
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
      margin-top: 72px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
    }
    .stat-number {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 0.85rem; color: var(--muted); }

    /* ── Services ── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: border-color 0.25s, transform 0.25s;
    }
    .service-card:hover {
      border-color: rgba(0,212,255,0.35);
      transform: translateY(-4px);
    }
    .service-icon { font-size: 2rem; margin-bottom: 16px; }
    .service-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
    .service-desc { font-size: 0.9rem; color: var(--muted); line-height: 1.65; }

    /* ── Results ── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    .result-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .result-metric {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .result-desc { font-size: 0.92rem; color: var(--muted); }
    .result-company {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-top: auto;
    }

    /* ── Industries ── */
    .industries-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 48px;
    }
    .industry-pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* ── About ── */
    #about { background: var(--bg2); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px;
      align-items: center;
    }
    .about-text p { color: var(--muted); margin-bottom: 16px; line-height: 1.75; }
    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }
    .skill-chip {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.18);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
    }
    .about-highlights { display: flex; flex-direction: column; gap: 20px; }
    .highlight-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .highlight-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .highlight-body  { font-size: 0.85rem; color: var(--muted); }

    /* ── CTA ── */
    #contact { background: var(--bg); text-align: center; }
    .cta-box {
      background: linear-gradient(135deg, rgba(0,212,255,0.06), rgba(124,58,237,0.06));
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 20px;
      padding: 72px 48px;
      max-width: 720px;
      margin: 0 auto;
    }
    .cta-box .section-title { margin-bottom: 14px; }
    .cta-box .section-sub   { margin: 0 auto 36px; }
    .contact-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 32px;
    }
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-link:hover { color: var(--accent); }

    /* ── Footer ── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 28px 0;
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }
    footer span { color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .cta-box { padding: 48px 24px; }
      section { padding: 72px 0; }
    }
  </style>
</head>

<script>
  var currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-id').classList.toggle('active', lang === 'id');
    render(LANG[lang]);
    try { localStorage.setItem('lang', lang); } catch(e) {}
  }

  function render(L) {
    var S = SITE;
    var year = new Date().getFullYear();

    document.getElementById('page-title').textContent = S.name + ' \u2014 ' + L.pageTitle;
    document.getElementById('meta-desc').setAttribute('content', L.hero.sub);

    document.getElementById('nav-logo-el').innerHTML = S.name + '<span>' + S.nameAccent + '</span>';
    document.getElementById('nav-services').textContent = L.nav.services;
    document.getElementById('nav-results').textContent  = L.nav.results;
    document.getElementById('nav-about').textContent    = L.nav.about;
    document.getElementById('nav-cta').textContent      = L.nav.cta;

    document.getElementById('hero-tag').textContent = L.tagline;
    document.getElementById('hero-title').innerHTML =
      L.hero.title.replace(L.hero.highlightWord, '<span class="highlight">' + L.hero.highlightWord + '</span>');
    document.getElementById('hero-sub').textContent = L.hero.sub;
    document.getElementById('hero-actions').innerHTML =
      '<a href="' + L.hero.cta1.href + '" class="btn-primary">\u2192 ' + L.hero.cta1.label + '</a> ' +
      '<a href="' + L.hero.cta2.href + '" class="btn-secondary">' + L.hero.cta2.label + '</a>';

    document.getElementById('stats-row').innerHTML = L.stats.map(function(s) {
      return '<div class="stat-item"><div class="stat-number">' + s.number + '</div><div class="stat-label">' + s.label + '</div></div>';
    }).join('');

    document.getElementById('services-header').innerHTML =
      '<span class="tag">' + L.services.tag + '</span>' +
      '<h2 class="section-title">' + L.services.title + '</h2>' +
      '<p class="section-sub">' + L.services.sub + '</p>';

    document.getElementById('services-grid').innerHTML = L.services.items.map(function(s) {
      return '<div class="service-card"><div class="service-icon">' + s.icon + '</div>' +
             '<div class="service-title">' + s.title + '</div>' +
             '<div class="service-desc">' + s.desc + '</div></div>';
    }).join('');

    document.getElementById('results-header').innerHTML =
      '<span class="tag">' + L.results.tag + '</span>' +
      '<h2 class="section-title">' + L.results.title + '</h2>' +
      '<p class="section-sub">' + L.results.sub + '</p>';

    document.getElementById('results-grid').innerHTML = L.results.items.map(function(r) {
      return '<div class="result-card"><div class="result-metric">' + r.metric + '</div>' +
             '<div class="result-desc">' + r.desc + '</div>' +
             '<div class="result-company">' + r.company + '</div></div>';
    }).join('');

    document.getElementById('industries-row').innerHTML =
      '<div style="width:100%;margin-bottom:8px;font-size:0.78rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">' + L.results.industriesLabel + '</div>' +
      L.results.industries.map(function(i) { return '<span class="industry-pill">' + i + '</span>'; }).join('');

    document.getElementById('about-tag').textContent   = L.about.tag;
    document.getElementById('about-title').textContent = L.about.title;
    document.getElementById('about-bio').innerHTML = L.about.bio.map(function(p) { return '<p>' + p + '</p>'; }).join('');

    document.getElementById('skills-list').innerHTML = S.skills.map(function(sk) {
      return '<span class="skill-chip">' + sk + '</span>';
    }).join('');

    document.getElementById('about-highlights').innerHTML = L.about.highlights.map(function(h) {
      return '<div class="highlight-item"><div class="highlight-title">' + h.title + '</div>' +
             '<div class="highlight-body">' + h.body + '</div></div>';
    }).join('');

    document.getElementById('contact-tag').textContent   = L.contact.tag;
    document.getElementById('contact-title').textContent = L.contact.title;
    document.getElementById('contact-sub').textContent   = L.contact.sub;
    document.getElementById('cta-actions').innerHTML =
      '<a href="' + S.contact.whatsapp + '" class="btn-primary" target="_blank" rel="noopener">\u2192 ' + L.contact.ctaBtn + '</a>';
    document.getElementById('contact-links').innerHTML =
      '<a href="mailto:' + S.contact.email + '" class="contact-link">\u2709 ' + S.contact.email + '</a>' +
      '<a href="' + S.contact.linkedin + '" class="contact-link" target="_blank" rel="noopener">in LinkedIn</a>' +
      '<a href="' + S.contact.twitter  + '" class="contact-link" target="_blank" rel="noopener">\uD835\uDD4F Twitter</a>';

    document.getElementById('footer-text').innerHTML =
      '\u00A9 ' + year + ' <span>' + S.name + '</span>. ' + L.footer;
  }

  // Init — restore saved language preference or default to 'en'
  (function() {
    var saved = 'en';
    try { saved = localStorage.getItem('lang') || 'en'; } catch(e) {}
    setLang(saved);
  })();
</script>

</body>
</html>
